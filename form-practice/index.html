<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="script.js"></script>
</head>

<body>
    <h1 style="display: flex; justify-content: center;">Form Practice</h1>
    <form>

        <!-- basic details -->
        <div id="basic_details">
            <fieldset>
                <legend style="font-size: xx-large;">Basic Details :</legend>
                <br>
                <label for="fname">First name:</label>
                <input type="text" id="fname" name="fname">
                <label style="padding-left: 75px;" for="lname">Last name:</label>
                <input type="text" id="lname" name="lname">
                <br>
                <br>
                <label for="designation">Designation:</label>
                <input type="text" id="designation" name="designation">
                <br>
                <br>
                <br>
                <br>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email">
                <label style="padding-left: 75px;" for="mobile_number">Mobile Number:</label>
                <input type="tel" id="mobile_number" name="mobilenumber">
                <br>
                <br>
                <br>
                <br>
                <label for="adress_1">Address 1:</label>
                <input type="text" id="adress_1" name="adress_1">
                <label style="padding-left: 75px;" for="adress_2">Address 2:</label>
                <input type="text" id="adress_2" name="adress_2">
                <br>
                <br>
                <label for="city">City:</label>
                <input type="text" id="city" name="city">
                <label style="padding-left: 75px;" for="state">State:</label>
                <select name="state" id="state">
                    <option value="Gujarat">Gujarat</option>
                    <option value="Maharashtra">Maharashtra</option>
                    <option value="Delhi">Delhi</option>
                </select>
                <label style="padding-left: 75px;" for="pincode">Pincode:</label>
                <input type="text" id="pincode" name="pincode">
                <br>
                <br>
                <br>
                <br>
                <label>Gender</label>
                <input type="radio" id="male" name="gender" value="male">
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female">
                <label for="female">Female</label>

                <label style="padding-left: 75px;" for="relationship_status">Relationship Status:</label>
                <select name="relationship_status" id="relationship_status">
                    <option value="single">Single</option>
                    <option value="married">Married</option>
                    <option value="divorced">Divorced</option>
                </select>
                <label style="padding-left: 75px;" for="dob">Date of Birth:</label>
                <input type="date" id="dob" name="dob">
            </fieldset>
        </div>
        <br><br><br>

        <!-- education -->
        <div id="education_details">
            <fieldset>
                <legend style="font-size: xx-large;">Education Details :</legend>
                <div id="education_container">

                    <button type="button" onclick="addEducation()">Add Field</button><button type="button"
                        onclick="removeEducation()">Remove Field</button>
                    <br><br>
                    <label for="course_1">Course:</label>
                    <input type="text" id="course_1" name="course"><br><br>
                    <label for="passing_year_1">Passing Year:</label>
                    <input type="number" id="passing_year_1" name="passing_year_1">
                    <label style="padding-left: 40px;" for="uni_board_1">University/Board:</label>
                    <input type="text" id="uni_board_1" name="uni_board_1">
                    <label style="padding-left: 40px;" for="percentage_1">Percentage:</label>
                    <input type="number" id="percentage_1" name="percentage_1" step="0.01">
                </div>
            </fieldset>
        </div> <br><br><br>

        <!-- experience -->
        <div id="experience">
            <fieldset>
                <legend style="font-size: xx-large;">Experience Details :
                </legend>
                <div id="experience_container">

                    <button type="button" onclick="addExperience()">Add Field</button><button type="button"
                        onclick="removeExperience()">Remove Field</button><br><br>
                    <label for="company_1">Company:</label>
                    <input type="text" id="company_1" name="company_1">
                    <label id="designation_label_1" style="padding-left: 75px;" for="designation_1">Designation:</label>
                    <input type="text" id="designation_1" name="designation_1">
                    <label id="annual_package_label_1" style="padding-left: 75px;" for="annual_package_1">Annual
                        Package:</label>
                    <input type="number" id="annual_package_1" name="annual_package_1" step="0.01"><br><br>
                    <label id="from_label_1" for="from_1">From:</label>
                    <input type="date" id="from_1" name="from_1">
                    <label id="to_label_1" style="padding-left: 75px;" for="to_1">To:</label>
                    <input type="date" id="to_1" name="to_1">
                    <label id="reason_to_leave_label_1" style="padding-left: 75px;" for="reason_to_leave_1">Reason for
                        Leaving:</label>
                    <input type="text" name="reason_to_leave_1" id="reason_to_leave_1"></input><br><br>
                    <label id="ref_contact_label_1" for="ref_contact_1">Referral Contact:</label>
                    <input type="text" id="ref_contact_1" name="ref_contact_1">
                    <label id="ref_name_label_1" style="padding-left: 75px;" for="ref_name_1">Referral Name:</label>
                    <input type="text" id="ref_name_1" name="ref_name_1">
                </div>
            </fieldset>
        </div><br><br><br>

        <!-- languages known -->
        <div id="languages_known">
            <fieldset>
                <legend style="font-size: xx-large;">Languages Known</legend>
                <div style="margin-bottom: 10px;">
                    <input type="text" id="language_input" placeholder="Add language">
                    <button type="button" onclick="addLanguage()">Add</button>
                </div>
                <div id="languages_list">
                    <label for="english">English</label>
                    <input type="checkbox" id="english" name="english" value="English" onclick="checkBox(this)">
                    </input><br>
                    <label for="hindi">Hindi</label>
                    <input type="checkbox" id="hindi" name="hindi" value="Hindi" onclick="checkBox(this)"> </input><br>
                    <label for="gujarati">Gujarati</label>
                    <input type="checkbox" id="gujarati" name="gujarati" value="Gujarati" onclick="checkBox(this)">
                    </input><br>
                </div>
            </fieldset>
        </div><br><br><br>

        <!-- technologies known -->
        <div id="technologies_known">
            <fieldset>
                <legend style="font-size: xx-large;">Technologies Known</legend>
                <div style="margin-bottom: 10px;">
                    <input type="text" id="technology_input" placeholder="Add technology">
                    <button type="button" onclick="addTechnology()">Add</button>
                </div>
                <div id="technologies_list">
                    <label for="php">PHP</label>
                    <input type="checkbox" id="php" name="php" value="PHP" onclick="radioButton(this)"> </input><br>
                    <label for="MySQL">MySQL</label>
                    <input type="checkbox" id="MySQL" name="MySQL" value="MySQL" onclick="radioButton(this)">
                    </input><br>
                    <label for="Laravel">Laravel</label>
                    <input type="checkbox" id="Laravel" name="Laravel" value="Laravel" onclick="radioButton(this)">
                    </input><br>
                    <label for="oracle">Oracle</label>
                    <input type="checkbox" id="oracle" name="oracle" value="Oracle" onclick="radioButton(this)">
                    </input><br>
                </div>
            </fieldset>
        </div><br><br><br>

        <!-- references contact -->
        <div id="reference_contact">
            <fieldset>
                <legend style="font-size: xx-large;">Reference Contact</legend>
                <label for="ref_name_1">Name:</label>
                <input type="text" id="ref_name" name="ref_name">
                <label style="padding-left: 75px;" for="ref_email">Email:</label>
                <input type="email" id="ref_email" name="ref_email">
                <label style="padding-left: 75px;" for="ref_phone">Phone Number:</label>
                <input type="tel" id="ref_phone" name="ref_phone">
            </fieldset>
        </div><br><br><br>

        <!-- preferences -->
        <div id="preferences">
            <fieldset>
                <legend style="font-size: xx-large;">Preferences</legend>
                <label for="job_location">Preferred Job Location:</label>
                <select name="job_location" id="job_location" multiple>
                    <option value="ahemdabad">Ahmedabad</option>
                    <option value="anand">Anand</option>
                </select>
                <label style="padding-left: 75px;" for="expected_salary">Expected Salary:</label>
                <input type="number" id="expected_salary" name="expected_salary" step="0.01">
                <label style="padding-left: 75px;" for="current_salary">Current Salary:</label>
                <input type="number" id="current_salary" name="current_salary" step="0.01"><br><br>
                <label for="notice_period">Notice Period (in days):</label>
                <input type="number" id="notice_period" name="notice_period">
                <label for="preferred_role">Preferred Role:</label>
                <select name="preferred_role" id="preferred_role">
                    <option value="developer">Developer</option>
                    <option value="manager">Manager</option>
                    <option value="analyst">Analyst</option>
                </select>
            </fieldset>
    </form>
</body>

</html>
